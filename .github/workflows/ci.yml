name: CI

# Define when this workflow runs.
on:
    # Run CI whenever commits are pushed to any branch.
    push:
    # Run CI when a pull request is opened or updated.
    pull_request:
    # Allow running this workflow manually from the GitHub Actions page.
    workflow_dispatch:

jobs:
    # Check Python files without running pytest yet.
    python-check:
        # This name is shown in the GitHub Actions job list.
        name: Python ${{ matrix.python-version }}
        # Use GitHub's latest Ubuntu runner.
        runs-on: ubuntu-latest

        strategy:
            # Keep checking other Python versions even if one version fails.
            fail-fast: false
            # Run the same checks on both Python 3.11, 3.12, and 3.13.
            matrix:
                python-version: ["3.11", "3.12", "3.13"]

        steps:
            # Download this repository into the GitHub Actions runner.
            - name: Checkout
              uses: actions/checkout@v4

            # Install the Python version selected by the matrix above.
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            # Install only the tools needed for this CI.
            # pytest is intentionally not installed yet.
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ruff

            # Compile Python files to catch syntax errors.
            # This does not run the program; it only checks whether Python can parse it.
            - name: Syntax check
              run: python -m compileall .

            # Run Ruff lint checks.
            # This catches unused imports, some likely bugs, and style issues.
            - name: Lint
              run: ruff check .

            # Check whether files are formatted with Ruff's formatter.
            # This does not rewrite files; it fails CI when formatting is needed.
            - name: Format check
              run: ruff format --check .
